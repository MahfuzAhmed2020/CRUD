# #===========================for MySQL mysql -u root -p =============================
# # If you want to switch to MySQL, comment out the H2 configuration above and uncomment the MySQL configuration below.
# # Make sure you create the database in MySQL first:
# # CREATE DATABASE crud_db;

# Spring Application Name
spring.application.name=CRUD

# MySQL Database Configuration
# docker run --name mysql-container -e MYSQL_ROOT_PASSWORD=root -p 3306:3306 -d mysql:latest
# spring.datasource.url=jdbc:mysql://host.docker.internal:3306/cruddb

spring.datasource.url=jdbc:mysql://localhost:3306/crud_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Settings
# Automatically create tables
spring.jpa.hibernate.ddl-auto=update 
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# H2 Console Disabled (Not used for MySQL)
# spring.h2.console.enabled=false

